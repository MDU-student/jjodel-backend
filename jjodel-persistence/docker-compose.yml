# this runs both the persistence and the backend in one command, for development purposes.
# TODO: add frontend 
version: '3.8'



services:
  jjodel-persistence:
    image: postgres:16-alpine3.23
    container_name: jjodel-persistence
    env_file:
    - .env
    environment:
    
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - jjodel-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  jjodel-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jjodel-backend
    env_file:
    - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=jjodel-persistence;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    ports:
      - "5116:80"
      - "7289:443"
    depends_on:
      jjodel-persistence:
        condition: service_healthy

volumes:
  jjodel-data:

